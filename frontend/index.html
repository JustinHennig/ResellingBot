<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ResellingBot</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #0f1117;
        color: #e2e8f0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .card {
        background: #1a1d2e;
        border: 1px solid #2d3148;
        border-radius: 18px;
        padding: 44px 40px 36px;
        width: 340px;
        text-align: center;
      }

      h1 {
        font-size: 1.4rem;
        font-weight: 700;
        letter-spacing: -0.4px;
        color: #fff;
        margin-bottom: 28px;
      }

      /* Status badge */
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 7px 16px;
        border-radius: 999px;
        font-size: 0.85rem;
        font-weight: 600;
        margin-bottom: 28px;
        transition:
          background 0.3s,
          color 0.3s;
      }
      .badge.running {
        background: #14532d33;
        color: #4ade80;
        border: 1px solid #4ade8040;
      }
      .badge.stopped {
        background: #450a0a33;
        color: #f87171;
        border: 1px solid #f8717140;
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: currentColor;
      }
      .dot.pulse {
        animation: pulse 1.6s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.35;
        }
      }

      /* Toggle button */
      .btn-toggle {
        width: 100%;
        padding: 13px;
        border-radius: 10px;
        border: none;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition:
          opacity 0.15s,
          transform 0.1s;
        margin-bottom: 28px;
      }
      .btn-toggle:active:not(:disabled) {
        transform: scale(0.975);
      }
      .btn-toggle:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      .btn-toggle.start {
        background: #4ade80;
        color: #052e16;
      }
      .btn-toggle.stop {
        background: #f87171;
        color: #450a0a;
      }
      .btn-toggle.pending {
        background: #334155;
        color: #94a3b8;
      }

      /* Interval section */
      .section-label {
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: #64748b;
        margin-bottom: 10px;
      }

      .interval-row {
        display: flex;
        gap: 8px;
      }

      .interval-input {
        flex: 1;
        background: #0f1117;
        border: 1px solid #2d3148;
        border-radius: 8px;
        color: #e2e8f0;
        font-size: 0.95rem;
        padding: 10px 12px;
        outline: none;
        transition: border-color 0.15s;
      }
      .interval-input:focus {
        border-color: #6366f1;
      }

      .btn-set {
        background: #6366f1;
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 10px 18px;
        font-size: 0.9rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s;
        white-space: nowrap;
      }
      .btn-set:hover {
        background: #4f46e5;
      }

      /* Countdown */
      .countdown {
        font-size: 0.78rem;
        color: #64748b;
        margin-bottom: 20px;
        min-height: 1.1em;
        transition: opacity 0.3s;
      }
      .countdown span {
        color: #94a3b8;
        font-variant-numeric: tabular-nums;
      }

      /* Toast */
      .toast {
        margin-top: 14px;
        font-size: 0.8rem;
        min-height: 18px;
        transition: opacity 0.3s;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>ResellingBot</h1>

      <div id="badge" class="badge stopped">
        <span class="dot" id="dot"></span>
        <span id="badgeText">Stopped</span>
      </div>

      <button id="toggleBtn" class="btn-toggle start">Start</button>

      <div class="countdown" id="countdown"></div>
      <div class="interval-row">
        <input
          type="number"
          id="intervalInput"
          class="interval-input"
          min="1"
          placeholder="minutes"
        />
        <button class="btn-set" id="setIntervalBtn">Set</button>
      </div>

      <div class="toast" id="toast"></div>
    </div>

    <script src="{{ url_for('static', filename='main.js') }}" defer></script>
  </body>
</html>
