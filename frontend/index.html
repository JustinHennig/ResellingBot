<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ResellingBot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  </head>
  <body>
    <div class="card">
      <h1>ResellingBot</h1>

      <div id="badge" class="badge stopped">
        <span class="dot" id="dot"></span>
        <span id="badgeText">Stopped</span>
      </div>

      <button id="toggleBtn" class="btn-toggle start">Start</button>

      <div class="countdown" id="countdown"></div>
      <div class="interval-row">
        <input
          type="number"
          id="intervalInput"
          class="interval-input"
          min="1"
          placeholder="minutes"
        />
        <button class="btn-set" id="setIntervalBtn">Set</button>
      </div>

      <div class="toast" id="toast"></div>

      <div class="searches-section">
        <p class="section-label">Searches</p>
        <div id="searchesList" class="searches-list"></div>
      </div>
    </div>

    <script src="{{ url_for('static', filename='main.js') }}" defer></script>
  </body>
</html>
