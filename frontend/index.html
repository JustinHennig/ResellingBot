<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ResellingBot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body>
    <div class="card">
      <!-- Header -->
      <div class="header">
        <div class="header-title">
          <svg
            class="logo-icon"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.35-4.35" />
          </svg>
          <h1>ResellingBot</h1>
        </div>
        <div id="badge" class="badge stopped">
          <span class="dot" id="dot"></span>
          <span id="badgeText">Stopped</span>
        </div>
      </div>

      <!-- Controls -->
      <div class="control-row">
        <button id="toggleBtn" class="btn-toggle start">Start</button>
        <div class="interval-group">
          <input
            type="number"
            id="intervalInput"
            class="interval-input"
            min="1"
            placeholder="5"
          />
          <span class="interval-unit">min</span>
          <button class="btn-set" id="setIntervalBtn">Set</button>
        </div>
      </div>

      <div class="countdown" id="countdown"></div>

      <!-- Searches -->
      <div class="searches-section">
        <div class="section-header">
          <p class="section-label">Searches</p>
          <div style="display: flex; gap: 8px; align-items: center">
            <button id="addSearchBtn" class="btn-set">+ Add</button>
            <a href="/log" class="btn-set" style="text-decoration: none"
              >View Log</a
            >
            <button id="clearSeenBtn" class="btn-danger">
              Clear seen listings
            </button>
          </div>
        </div>
        <div id="searchesList" class="searches-list"></div>
      </div>

      <div class="toast" id="toast"></div>
    </div>

    <script src="{{ url_for('static', filename='main.js') }}" defer></script>

    <!-- Add Search Modal -->
    <div id="addSearchModal" class="modal-overlay" style="display: none">
      <div class="modal">
        <div class="modal-header">
          <span class="modal-title">Add Search</span>
          <button class="modal-close" id="modalCloseBtn">&#x2715;</button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label class="form-label">Name</label>
            <input
              type="text"
              id="newSearchName"
              class="form-input"
              placeholder="iPhone 14"
              autocomplete="off"
            />
          </div>
          <div class="form-group">
            <label class="form-label"
              >Query
              <span class="form-hint">(leave blank to use name)</span></label
            >
            <input
              type="text"
              id="newSearchQuery"
              class="form-input"
              placeholder="iphone 14"
              autocomplete="off"
            />
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Min price (&#x20AC;)</label>
              <input
                type="number"
                id="newSearchMinPrice"
                class="form-input"
                placeholder="0"
                min="0"
              />
            </div>
            <div class="form-group">
              <label class="form-label">Max price (&#x20AC;)</label>
              <input
                type="number"
                id="newSearchMaxPrice"
                class="form-input"
                placeholder="0"
                min="0"
              />
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-set" id="addSearchSubmitBtn">Add Search</button>
        </div>
      </div>
    </div>
  </body>
</html>
